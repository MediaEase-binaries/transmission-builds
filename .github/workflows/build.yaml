name: Build Transmission

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Transmission version to build"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "4.0.6"
          - "4.1.0"
          - "4.1.1"

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generating matrix
        id: generate
        run: |
          pip3 install --upgrade pyyaml
          echo "Generating matrix..."
          MATRIX=$(python3 matrix.py)
          echo "$MATRIX" > matrix.json
          echo "matrix<<EOF" >> $GITHUB_ENV
          cat matrix.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Filter matrix for workflow_dispatch
        run: |
          pip3 install --upgrade pyyaml
          python3 << 'PY'
          import os, sys, yaml
          key = os.environ["MATRIX_VERSION_KEY"]
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          sel = os.environ.get("WF_VERSION", "all")
          with open("matrix.json") as f:
              data = yaml.safe_load(f)
          inc = list(data.get("include") or [])
          if event == "workflow_dispatch" and sel and sel != "all":
              inc = [r for r in inc if str(r.get(key)) == sel]
              if not inc:
                  sys.stderr.write(f"::error::No matrix entry where {key}={sel!r}\n")
                  sys.exit(1)
          with open("matrix.json", "w") as f:
              yaml.safe_dump({"include": inc}, f, sort_keys=False)
          print(yaml.safe_dump({"include": inc}, sort_keys=False))
          PY
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> "$GITHUB_ENV"
        env:
          MATRIX_VERSION_KEY: version
          WF_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || 'all' }}

      - name: Setup matrix
        id: set
        uses: druzsan/setup-matrix@v2
        with:
          matrix: |
            ${{ env.matrix }}

  build:
    name: v${{ matrix.version }} (${{ matrix.os }})
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive
      COMMITTER_NAME: ${{ secrets.COMMITTER_NAME }}
      COMMITTER_EMAIL: ${{ secrets.COMMITTER_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout tools repository
        uses: actions/checkout@v6
        with:
          repository: krate-binaries/tools
          path: tools

      - name: Setup variables
        id: vars
        run: |
          find tools/ -name "*.sh" -exec chmod +x {} +
          echo "build_script=tools/packages/transmission/build.sh" >> $GITHUB_OUTPUT
          echo "package_name=transmission-daemon" >> $GITHUB_OUTPUT
          echo "metadata_script=tools/generate_metadata.sh" >> $GITHUB_OUTPUT
          echo "control_file=tools/packages/transmission/control" >> $GITHUB_OUTPUT
          echo "package_script=tools/generate_package.sh" >> $GITHUB_OUTPUT
          echo "temp_dir=/tmp/transmission-build/install" >> $GITHUB_OUTPUT

      - name: Update APT
        run: |
          apt-get update -qq
          # tools/packages/transmission/build.sh: git, cmake, gettext (ENABLE_NLS), NAT-PMP / miniupnpc
          apt-get install -yqq --no-install-recommends \
            ca-certificates curl wget git jq \
            lsb-release gnupg debian-archive-keyring \
            debconf-utils sudo \
            build-essential cmake pkg-config \
            gettext \
            libssl-dev zlib1g-dev libcurl4-openssl-dev \
            libnatpmp-dev libminiupnpc-dev \
            libsystemd-dev \
            gzip xz-utils file dpkg \
            upx-ucl

      - name: Update control file (pinned tags)
        run: |
          sed -i "s/^Version:.*/Version: ${{ matrix.version }}-1/" ${{ steps.vars.outputs.control_file }}
          sed -i "s/^Package:.*/Package: ${{ steps.vars.outputs.package_name }}/" ${{ steps.vars.outputs.control_file }}
          sed -i "s/^Maintainer:.*/Maintainer: ${{ secrets.COMMITTER_NAME }} <${{ secrets.COMMITTER_EMAIL }}>/" ${{ steps.vars.outputs.control_file }}
      - name: Build Transmission
        id: build
        run: |
          chmod +x ${{ steps.vars.outputs.build_script }}
          ./${{ steps.vars.outputs.build_script }} ${{ matrix.version }}
          echo "compiled=true" >> $GITHUB_OUTPUT

      - name: Generate metadata
        if: steps.build.outputs.compiled == 'true'
        run: |
          mkdir -p artifacts
          find . -name "krate-transmission*.deb" -exec mv {} artifacts/ \;
          cd artifacts
          deb_file=$(basename "$(find . -name "krate-transmission*.deb" | head -1)")
          echo "Generating metadata for DEB file: $deb_file"
          ../${{ steps.vars.outputs.metadata_script }} \
            --category "transmission" \
            --tag "release" \
            --version "${{ matrix.version }}" \
            --os "${{ matrix.codename }}" \
            "$deb_file"
          ls -l "$(basename "$deb_file" .deb).json"

      - name: Upload as Artifact
        if: steps.build.outputs.compiled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transmission-${{ matrix.version }}-${{ matrix.os }}
          path: artifacts/*
          retention-days: 7

  release:
    name: Create Releases
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version: ["4.0.6", "4.1.0", "4.1.1"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout tools repository
        uses: actions/checkout@v6
        with:
          repository: krate-binaries/tools
          path: tools

      - name: Download artifacts for this version
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          pattern: transmission-*${{ matrix.version }}*

      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release_assets
          find downloaded_artifacts -type f \
            \( -name "krate-transmission*${{ matrix.version }}*.deb" -o \
              -name "krate-transmission*${{ matrix.version }}*.json" \) \
            -exec cp {} release_assets/ \;
          pip3 install --upgrade pyyaml
          python3 tools/ci/release_notes.py \
            --product transmission \
            --version "${{ matrix.version }}" \
            --assets-dir release_assets \
            --github-output
          ls -la release_assets/
          if [[ ${{ matrix.version }} == *"beta"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          if [[ -z "$(ls release_assets/*.deb 2>/dev/null)" ]]; then
            echo "skip_release=true" >> $GITHUB_OUTPUT
            echo "No packages to release"
            ls -lah release_assets/
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.prepare.outputs.skip_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.version }}
          name: Transmission ${{ matrix.version }}
          files: |
            release_assets/*
          draft: false
          prerelease: ${{ steps.prepare.outputs.prerelease }}
          generate_release_notes: false
          body: ${{ steps.prepare.outputs.release_body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
